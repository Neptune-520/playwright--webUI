{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}自动化测试平台{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{% static 'css/base.css' %}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <i class="bi bi-gear-wide-connected"></i> 测试平台
        </div>
        <nav class="nav flex-column">
            <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                <i class="bi bi-speedometer2"></i> 仪表盘
            </a>
            <a class="nav-link {% if request.path == '/groups/' %}active{% endif %}" href="/groups/">
                <i class="bi bi-folder"></i> 分组管理
            </a>
            <a class="nav-link {% if 'global-config' in request.path %}active{% endif %}" href="/global-config/">
                <i class="bi bi-gear"></i> 全局配置
            </a>
            <a class="nav-link {% if 'action-sets' in request.path %}active{% endif %}" href="/action-sets/">
                <i class="bi bi-collection"></i> 动作集合
            </a>
            <a class="nav-link {% if 'scripts' in request.path and 'aggregate' not in request.path %}active{% endif %}" href="/scripts/">
                <i class="bi bi-code-slash"></i> 脚本管理
            </a>
            <a class="nav-link {% if 'editor' in request.path %}active{% endif %}" href="/editor/">
                <i class="bi bi-pencil-square"></i> 可视化编辑器
            </a>
            <a class="nav-link {% if request.path == '/tasks/' %}active{% endif %}" href="/tasks/">
                <i class="bi bi-list-task"></i> 测试任务
            </a>
            <a class="nav-link {% if 'results' in request.path %}active{% endif %}" href="/results/">
                <i class="bi bi-file-earmark-text"></i> 测试结果
            </a>
            <a class="nav-link {% if 'error-config' in request.path %}active{% endif %}" href="/error-config/">
                <i class="bi bi-exclamation-triangle"></i> 错误配置
            </a>
        </nav>
    </div>
    
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
    
    <div class="toast-container"></div>
    
    <script src="{% static 'js/base.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
